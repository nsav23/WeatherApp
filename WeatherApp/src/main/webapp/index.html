<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/html">
<head>
    <link rel="stylesheet" type="text/css" href="style.css">
    <SCRIPT language="JavaScript" src="script.js"></SCRIPT>
    <title>Weather App</title>
</head>
<body>
    <h1> Weather App </h1>
    <h2> Current Weather </h2>
    <div class="all-boxes">
        <div class="top-boxes">
            <div class="box">
                <div class="value-vertical">
                    <img id="tempIcon" class="weather-icon" src="" alt="Temperature Icon">
                    <div class="label">Temperature</div>
                    <div class="number" id="tempReading"></div>
                    <span class="text" id="tempText"></span>
                </div>
            </div>
            <div class="box">
                <div class="value value-vertical">
                    <img id="humIcon" class="weather-icon" src="" alt="Humidity Icon">
                    <div class="label">Humidity</div>
                    <div class="number" id="humidityReading"></div>
                    <span class="text" id="humText"></span>
                </div>
            </div>
            <div class="box">
                <div class="value" id="airQualityReading"></div>
                <div class="label"></div>
            </div>
        </div>
        <div class="bottom-box">
            <!-- Most of these are placeholders -->
            <div class="boxAtm">
                <div class="valueLow">
                    <div class="label">Pressure</div>
                    <div class="valueLow" id="atmPressureReading"></div>
                </div>
            </div>
            <div class="boxAlt">
                <div class="valueLow">
                    <div class="label">Altitude</div>
                    <div class="valueLow" id="altitudeReading"></div>
                </div>
            </div>
            <div class="boxWSR">
                <div class="valueLow" id="windSpeedReading"></div>
                <div class="label"></div>
            </div>
            <div class="boxCOR">
                <div class="valueLow">
                    <div class="label">Chance of Rain</div>
                    <div class="valueLow" id="chanceOfRain"></div>
                </div>
            </div>
            <div class="boxUV">
                <div class="valueLow" id="uvReading"></div>
                <div class="label"></div>
            </div>
        </div>
    </div>
</body>
